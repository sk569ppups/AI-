<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIプロンプトチャート ビギナー</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#dfe3ea;
      --text:#1f2937;
      --sub:#6b7280;
      --accent:#111827;
      --accent2:#2563eb;
      --soft:#eef2ff;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      margin-bottom:20px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.2;
    }

    .hero p{
      margin:0;
      color:var(--sub);
      max-width:920px;
    }

    .progress-wrap{
      margin-top:16px;
      width:100%;
      background:#e5e7eb;
      height:10px;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#111827,#2563eb);
      transition:.25s ease;
    }

    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:24px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .card-header{
      padding:20px 20px 8px;
    }

    .card-header h2,
    .card-header h3{
      margin:0 0 6px;
      line-height:1.35;
    }

    .card-desc{
      color:var(--sub);
      font-size:14px;
    }

    .card-body{
      padding:20px;
    }

    .sidebar{
      position:sticky;
      top:16px;
    }

    .log-item{
      margin-bottom:18px;
    }

    .log-label{
      font-size:13px;
      color:var(--sub);
      margin-bottom:6px;
    }

    .log-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .log-value{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      flex:1;
      min-width:0;
    }

    .log-action{
      flex-shrink:0;
    }

    .mini-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--sub);
      border-radius:999px;
      padding:6px 10px;
      font:inherit;
      font-size:12px;
      cursor:pointer;
      transition:.2s ease;
      line-height:1.2;
    }

    .mini-btn:hover{
      background:#f9fafb;
      color:var(--text);
      border-color:#c9d1dc;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      background:#f3f4f6;
      border:1px solid var(--line);
      font-size:13px;
      line-height:1.2;
    }

    .badge.outline{
      background:#fff;
    }

    .badge.current{
      background:var(--soft);
      border-color:var(--accent2);
    }

    .mobile-log-toggle{
      display:none;
      margin-bottom:16px;
    }

    .toggle-btn{
      width:100%;
      border:none;
      background:transparent;
      text-align:left;
      font:inherit;
      color:inherit;
      cursor:pointer;
      padding:0;
    }

    .step-title{
      font-size:14px;
      color:var(--sub);
      margin-bottom:10px;
    }

    .question{
      font-size:28px;
      font-weight:700;
      line-height:1.35;
      margin:0 0 10px;
    }

    .question-desc{
      font-size:15px;
      color:var(--sub);
      margin:0 0 18px;
    }

    .option-list{
      display:grid;
      gap:12px;
    }

    .option-btn,
    .check-item{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:16px;
      cursor:pointer;
      transition:.2s ease;
    }

    .option-btn:hover,
    .check-item:hover{
      background:#fafafa;
      border-color:#c9d1dc;
    }

    .option-btn.active,
    .check-item.active{
      border-color:var(--accent2);
      background:var(--soft);
    }

    .option-title{
      font-weight:700;
      margin-bottom:4px;
    }

    .option-desc{
      color:var(--sub);
      font-size:14px;
    }

    .check-item{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }

    .check-item input{
      margin-top:4px;
      transform:scale(1.15);
      accent-color:var(--accent2);
    }

    .check-item.disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .hint{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      background:#f9fafb;
      color:var(--sub);
      font-size:14px;
      border:1px dashed var(--line);
    }

    .actions{
      margin-top:20px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:11px 16px;
      font:inherit;
      cursor:pointer;
      transition:.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover:not(:disabled){
      background:#000;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn-secondary:hover:not(:disabled){
      background:#f9fafb;
    }

    .result-stack{
      display:grid;
      gap:16px;
    }

    .result-text{
      margin:0;
    }

    .codebox{
      background:#0f172a;
      color:#e5eefc;
      border-radius:16px;
      padding:16px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
      max-height:460px;
      line-height:1.65;
    }

    .copy-row{
      margin-top:12px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .small-note{
      margin-top:8px;
      color:var(--sub);
      font-size:14px;
    }

    .ol{
      margin:0;
      padding-left:20px;
    }

    .ol li + li{
      margin-top:8px;
    }

    @media (max-width: 900px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        display:none;
      }
      .mobile-log-toggle{
        display:block;
      }
      .question{
        font-size:24px;
      }
      .wrap{
        padding:16px;
      }
      .log-row{
        flex-direction:column;
        align-items:flex-start;
      }
      .log-action{
        margin-top:4px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>AIプロンプトチャート ビギナー</h1>
      <p>GPTで新しいチャットを始めるための、初心者向けプロンプト作成チャートです。やりたいこと・用途・出し方を選ぶだけで、そのまま貼って使えるチャット用プロンプトを作成できます。</p>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </section>

    <div class="mobile-log-toggle">
      <div class="card">
        <div class="card-header">
          <button class="toggle-btn" id="mobileLogBtn">
            <h3>現在の選択内容 <span id="mobileArrow">▼</span></h3>
            <div class="card-desc">選択内容と進行フローを確認できます</div>
          </button>
        </div>
        <div class="card-body" id="mobileLogBody" style="display:none;"></div>
      </div>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="card">
          <div class="card-header">
            <h3>現在の選択内容</h3>
            <div class="card-desc">ここまでの内容がたまっていきます</div>
          </div>
          <div class="card-body" id="sidebarLog"></div>
        </div>

        <div class="card" style="margin-top:16px;">
          <div class="card-header">
            <h3>進行フロー</h3>
            <div class="card-desc">今どこまで進んでいるか確認できます</div>
          </div>
          <div class="card-body" id="flowLog"></div>
        </div>
      </aside>

      <main id="app"></main>
    </div>
  </div>

      {

      }
    ];

    const state = {
      currentStep: 0,
      goal: null,
      target: null,
      style: []
    };

    function getStep1Label(value){
      const found = step1Options.find(o => o.value === value);
      return found ? found.label : "未選択";
    }

    function getStep2Options(){
      return step2Map[state.goal] || [];
    }

    function getStep2Label(value){
      const found = getStep2Options().find(o => o.value === value);
      return found ? found.label : "未選択";
    }

    function getStep3Label(value){
      const found = step3Options.find(o => o.value === value);
      return found ? found.label : value;
    }

    function getStep3Labels(values){
      if(!values || !values.length) return "未選択";
      return values.map(getStep3Label);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

        training_points: [
          "研修内容の要点を整理できます",
          "重要ポイントをつかみやすくなります",
          "復習用にまとめられます"
        ],
        training_learning: [
          "学びや気づきを整理できます",
          "自分の言葉でまとめやすくなります",
          "振り返りのたたき台を作れます"
        ],
        training_practice: [
          "実務への落とし込みができます",
          "次に何をすべきか整理できます",
          "現場での活かし方を考えられます"
        ],
        training_share: [
          "共有用の形にまとめられます",
          "伝わりやすく整理できます",
          "他人向けの説明に使えます"
        ]
      };

      return capabilityMap[state.target] || [
        "用途に合う形で整理できます",
        "たたき台を作れます",
        "新しいチャットですぐ使い始められます"
      ];
    }

    function getReasonList(){
      const reasons = [];

      const goalItem = step1Options.find(o => o.value === state.goal);
      const targetItem = getStep2Options().find(o => o.value === state.target);

      if(goalItem){
        reasons.push(`${goalItem.label}が目的として選ばれています`);
      }
      if(targetItem){
        reasons.push(`${targetItem.label}という用途に絞られています`);
      }
      if(state.style.includes("clear")){
        reasons.push("分かりやすさを重視する条件が選ばれています");
      }
      if(state.style.includes("short")){
        reasons.push("短くまとめる条件が選ばれています");
      }
      if(state.style.includes("good_impression")){
        reasons.push("印象よく整える条件が選ばれています");
      }
      if(state.style.includes("thorough")){
        reasons.push("漏れなく整理する条件が選ばれています");
      }

      return reasons;
    }

    function buildPrompt(){
      const chatSummary = getChatSummary();
      const styleLabels = getStep3Labels(state.style);
      const styleText = Array.isArray(styleLabels) ? styleLabels.join(" / ") : styleLabels;

      const baseRoleMap = {
        image_pop: "画像やPOPの方向性や修正内容を整理するアシスタント",
        sns_text: "SNS用文章を作成するアシスタント",
        polish_text: "文章を整えるアシスタント",
        read_report: "レポートを読み解いて整理するアシスタント",
        check_content: "表現や内容を確認するアシスタント",
        review_training: "研修内容を振り返って整理するアシスタント"
      };

      const goalInputGuideMap = {
        image_pop: "画像やPOPの目的、使いたい文言、雰囲気、修正したい点などを入力してください。",
        sns_text: "作りたい文章の目的、伝えたい内容、媒体、入れたい要素などを入力してください。",
        polish_text: "整えたい元の文章を入力してください。必要なら、どの方向に直したいかも補足してください。",
        read_report: "読みたいレポートや文章を入力してください。必要なら、特に見たい観点も補足してください。",
        check_content: "確認したい文章や内容を入力してください。必要なら、どこが気になっているかも補足してください。",
        review_training: "振り返りたい研修内容やメモを入力してください。必要なら、特に整理したい点も補足してください。"
      };

      return `# 役割
あなたは「${chatSummary}」として動く、${baseRoleMap[state.goal] || "実務補助アシスタント"}です。

# 目的
利用者が入力した内容をもとに、用途に合った形で実務に使いやすい出力を行ってください。

# このチャットでやりたいこと
- ${getChatSummary()}

# 出力方針
- ${styleText} を意識して出力してください
- 伝わりやすい順番で整理してください
- 必要に応じて、たたき台・修正案・補足案を出してください
- 不明点は勝手に断定せず、必要に応じて補足前提を置いてください

# 出力の基本ルール
- 実務でそのまま使いやすい形を優先する
- 長すぎる説明より、使える内容を優先する
- 必要なら箇条書きや見出しを使って整理する
- 元の意図がある場合は、なるべくそれを崩さない

# 入力案内
${goalInputGuideMap[state.goal] || "必要な内容を入力してください。"}

# 最初の対応
利用者が内容を入力したら、目的に合った形で整理・作成・確認を行ってください。`;
    }

    function canProceed(){
      const step = steps[state.currentStep];
      if(!step) return true;

      if(step.key === "goal"){
        return !!state.goal;
      }
      if(step.key === "target"){
        return !!state.target;
      }
      if(step.key === "style"){
        return state.style.length > 0;
      }
      return false;
    }

    function updateProgress(){
      const progress = state.currentStep >= steps.length ? 100 : (state.currentStep / steps.length) * 100;
      document.getElementById("progressBar").style.width = progress + "%";
    }

    function getFlowItems(){
      return [
        "① やりたいことを選ぶ",
        "② 用途を選ぶ",
        "③ 出し方を選ぶ",
        "④ 結果を確認する",
        "⑤ GPTで使い始める"
      ];
    }

    function renderFlowHtml(){
      const flowItems = getFlowItems();
      let currentIndex = state.currentStep;
      if(state.currentStep >= steps.length){
        currentIndex = 3;
      }

      return `
        <div class="log-item">
          <div class="log-value" style="display:grid; gap:10px;">
            ${flowItems.map((item, index) => {
              let klass = "badge outline";
              if(index < currentIndex){
                klass = "badge";
              }else if(index === currentIndex){
                klass = "badge current";
              }
              return `<div class="${klass}" style="width:100%; justify-content:flex-start;">${escapeHtml(item)}</div>`;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderLogHtml(includeActions = false){
      const styleLabels = getStep3Labels(state.style);

      return `
        <div class="log-item">
          <div class="log-label">やりたいこと</div>
          <div class="log-row">
            <div class="log-value"><span class="badge">${escapeHtml(getStep1Label(state.goal))}</span></div>
            ${includeActions ? `<div class="log-action"><button class="mini-btn" onclick="goToStep(0)">選択を変更</button></div>` : ``}
          </div>
        </div>

        <div class="log-item">
          <div class="log-label">用途</div>
          <div class="log-row">
            <div class="log-value"><span class="badge">${escapeHtml(getStep2Label(state.target))}</span></div>
            ${includeActions ? `<div class="log-action"><button class="mini-btn" onclick="goToStep(1)">選択を変更</button></div>` : ``}
          </div>
        </div>

        <div class="log-item">
          <div class="log-label">出し方</div>
          <div class="log-row">
            <div class="log-value">
              ${
                Array.isArray(styleLabels)
                  ? styleLabels.map(v => `<span class="badge outline">${escapeHtml(v)}</span>`).join("")
                  : `<span class="badge">${escapeHtml(styleLabels)}</span>`
              }
            </div>
            ${includeActions ? `<div class="log-action"><button class="mini-btn" onclick="goToStep(2)">選択を変更</button></div>` : ``}
          </div>
        </div>
      `;
    }

    function renderStep(){
      const app = document.getElementById("app");

      if(state.currentStep >= steps.length){
        renderResults();
        return;
      }

      const step = steps[state.currentStep];
      let options = [];

      if(step.key === "goal"){
        options = step1Options;
      }else if(step.key === "target"){
        options = getStep2Options();
      }else if(step.key === "style"){
        options = step3Options;
      }

      let optionsHtml = "";

      if(step.type === "single"){
        optionsHtml = options.map(opt => {
          const active = state[step.key] === opt.value;
          return `
            <button class="option-btn ${active ? "active" : ""}" onclick="selectSingle('${step.key}','${opt.value}')">
              <div class="option-title">${escapeHtml(opt.label)}</div>
              <div class="option-desc">${escapeHtml(opt.description || "")}</div>
            </button>
          `;
        }).join("");
      }

      if(step.type === "multi"){
        const selected = state[step.key];
        optionsHtml = options.map(opt => {
          const checked = selected.includes(opt.value);
          const limitReached = step.max ? selected.length >= step.max && !checked : false;

          return `
            <label class="check-item ${checked ? "active" : ""} ${limitReached ? "disabled" : ""}">
              <input
                type="checkbox"
                ${checked ? "checked" : ""}
                ${limitReached ? "disabled" : ""}
                onchange="toggleMulti('${step.key}','${opt.value}',${step.max || 999})"
              />
              <div>
                <div class="option-title">${escapeHtml(opt.label)}</div>
                <div class="option-desc">${escapeHtml(opt.description || "")}</div>
              </div>
            </label>
          `;
        }).join("");
      }

      const hintHtml = step.hint ? `<div class="hint">${escapeHtml(step.hint)}</div>` : "";

      app.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="step-title">STEP ${step.step} / ${steps.length}</div>
            <h2 class="question">${escapeHtml(step.title)}</h2>
            <p class="question-desc">${escapeHtml(step.description)}</p>
          </div>

          <div class="card-body">
            <div class="option-list">${optionsHtml}</div>
            ${hintHtml}

            <div class="actions">
              <button class="btn btn-secondary" onclick="prevStep()" ${state.currentStep === 0 ? "disabled" : ""}>戻る</button>
              <div class="btn-group">
                <button class="btn btn-secondary" onclick="resetAll()">最初からやり直す</button>
                <button class="btn btn-primary" onclick="nextStep()" ${canProceed() ? "" : "disabled"}>次へ</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderResults(){
      const app = document.getElementById("app");
      const chatSummary = getChatSummary();
      const capabilities = getCapabilityList();
      const reasons = getReasonList();
      const prompt = buildPrompt();

      app.innerHTML = `
        <div class="result-stack">
          <div class="card">
            <div class="card-header">
              <h2>あなたに合うチャット用プロンプトがまとまりました</h2>
              <div class="card-desc">選んだ内容をもとに、そのままGPTへ貼って使えるプロンプトを作成しました。</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>1. あなたが選んだ内容</h3></div>
            <div class="card-body">
              ${renderLogHtml(true)}
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>2. あなたのやりたいことはこれです</h3></div>
            <div class="card-body">
              <p class="result-text"><strong>${escapeHtml(chatSummary)}</strong></p>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>3. この形になった理由</h3></div>
            <div class="card-body">
              <ol class="ol">
                ${reasons.map(reason => `<li>${escapeHtml(reason)}</li>`).join("")}
              </ol>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>4. このチャットでできること</h3></div>
            <div class="card-body">
              <ol class="ol">
                ${capabilities.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
              </ol>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>5. GPTに貼る文章</h3></div>
            <div class="card-body">
              <div class="codebox" id="promptBox">${escapeHtml(prompt)}</div>
              <div class="copy-row">
                <button class="btn btn-secondary" onclick="copyText('promptBox')">コピー</button>
                <a href="https://chatgpt.com/" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">GPTを開く</a>
              </div>
              <div class="small-note">コピーした文章を新しいGPTチャットに貼り付けて使い始めてください。</div>
              <div class="small-note">スマホで利用している場合、「GPTを開く」はブラウザで開くことがあります。必要に応じてChatGPTアプリを開き、コピーした文章を新しいチャットに貼り付けてご利用ください。</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>6. このあとやること</h3></div>
            <div class="card-body">
              <ol class="ol">
                <li>「GPTに貼る文章」をコピーする</li>
                <li>「GPTを開く」を押して新しいチャットを開く</li>
                <li>コピーした文章を貼り付ける</li>
                <li>使いたい内容を入力してスタートする</li>
              </ol>

              <div class="actions" style="margin-top:18px;">
                <button class="btn btn-secondary" onclick="backToLastStep()">入力へ戻る</button>
                <button class="btn btn-secondary" onclick="resetAll()">最初からやり直す</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderAll(){
      document.getElementById("sidebarLog").innerHTML = renderLogHtml(false);
      document.getElementById("flowLog").innerHTML = renderFlowHtml();

      const mobileLogBody = document.getElementById("mobileLogBody");
      mobileLogBody.innerHTML = `
        ${renderLogHtml(false)}
        <hr style="border:none; border-top:1px solid #e5e7eb; margin:16px 0;">
        <div style="font-weight:700; margin-bottom:10px;">進行フロー</div>
        ${renderFlowHtml()}
      `;

      updateProgress();
      renderStep();
    }

    function selectSingle(key, value){
      if(key === "goal" && state.goal !== value){
        state.goal = value;
        state.target = null;
      }else{
        state[key] = value;
      }
      renderAll();
    }

    function toggleMulti(key, value, max){
      const arr = state[key];
      const index = arr.indexOf(value);

      if(index >= 0){
        arr.splice(index, 1);
      }else{
        if(arr.length >= max) return;
        arr.push(value);
      }

      renderAll();
    }

    function nextStep(){
      if(!canProceed()) return;
      state.currentStep++;
      renderAll();
    }

    function prevStep(){
      if(state.currentStep > 0){
        state.currentStep--;
        renderAll();
      }
    }

    function goToStep(stepIndex){
      state.currentStep = stepIndex;
      renderAll();
    }

    function backToLastStep(){
      state.currentStep = steps.length - 1;
      renderAll();
    }

    function resetAll(){
      state.currentStep = 0;
      state.goal = null;
      state.target = null;
      state.style = [];
      renderAll();
    }

    function copyText(elementId){
      const text = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert("コピーしました");
      });
    }

    document.getElementById("mobileLogBtn").addEventListener("click", () => {
      const body = document.getElementById("mobileLogBody");
      const arrow = document.getElementById("mobileArrow");
      const open = body.style.display === "block";
      body.style.display = open ? "none" : "block";
      arrow.textContent = open ? "▼" : "▲";
    });

    renderAll();
  </script>
</body>
</html>
